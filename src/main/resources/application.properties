# ── Alpaca Trading (paper trading by default) ────────────────────────────────
# Set these env vars in Railway to enable:
#   ALPACA_API_KEY, ALPACA_SECRET_KEY, ALPACA_ENABLED=true
scanner.alpaca-api-key=${ALPACA_API_KEY:}
scanner.alpaca-secret-key=${ALPACA_SECRET_KEY:}
scanner.alpaca-enabled=${ALPACA_ENABLED:false}
scanner.alpaca-paper=${ALPACA_PAPER:true}
scanner.alpaca-max-position=${ALPACA_MAX_POSITION:500}
scanner.alpaca-daily-loss-limit=${ALPACA_DAILY_LOSS_LIMIT:-200}
scanner.alpaca-max-daily-orders=${ALPACA_MAX_DAILY_ORDERS:10}
scanner.alpaca-min-confidence=${ALPACA_MIN_CONFIDENCE:75}

server.port=8080
spring.application.name=smc-scanner
spring.thymeleaf.cache=false

# Async / scheduling
spring.task.scheduling.pool.size=4
spring.task.execution.pool.core-size=4

# Debug scanner decisions
logging.level.com.smcscanner.strategy=DEBUG
