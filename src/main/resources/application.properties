scanner.polygon-api-key=${POLYGON_API_KEY}
scanner.discord-webhook-url=${DISCORD_WEBHOOK_URL}
scanner.discord-eod-webhook-url=${DISCORD_EOD_WEBHOOK_URL}
scanner.discord-swing-webhook-url=${DISCORD_SWING_WEBHOOK_URL:https://discord.com/api/webhooks/1486119577183322223/9splTpSOQiJ49ubZcE6V1h0X1IaIojA2SAY95UWdTGmTKzjVTarFKgzL78zBcyMUOWvX}
scanner.scan-interval=15
scanner.min-confidence=75
scanner.dashboard-port=8080
scanner.watchlist-path=watchlist.json
scanner.swing-lookback=5
scanner.displacement-atr-mult=1.8
scanner.ob-max-age-bars=50
scanner.fvg-min-size-atr=0.3
scanner.min-rvol=1.5
scanner.min-atr-percentile=30.0
scanner.max-spread-pct=0.15

server.port=8080
spring.application.name=smc-scanner
spring.thymeleaf.cache=false

# Async / scheduling
spring.task.scheduling.pool.size=4
spring.task.execution.pool.core-size=4

# Debug scanner decisions
logging.level.com.smcscanner.strategy=DEBUG
