<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="dashboard-token" th:content="${dashboardToken}" content=""/>
    <title>SD Scanner — Live Trades</title>
    <style>
        :root {
            --bg:#0d1117; --surface:#161b22; --border:#30363d;
            --text:#e6edf3; --muted:#8b949e;
            --green:#3fb950; --red:#f85149; --blue:#58a6ff;
            --yellow:#d29922; --purple:#bc8cff; --orange:#f0883e;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; min-height:100vh; }
        .header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
        .logo { display:flex; align-items:center; gap:10px; }
        .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }
        .logo h1 { font-size:18px; font-weight:700; color:var(--blue); letter-spacing:1px; }
        .logo p { font-size:11px; color:var(--muted); }
        .btn { padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; border:1px solid; transition:opacity .15s; }
        .btn:hover { opacity:.8; }
        .btn-blue   { background:rgba(88,166,255,.15); color:var(--blue);   border-color:var(--blue); }
        .btn-purple { background:rgba(188,140,255,.15); color:var(--purple); border-color:var(--purple); }
        .btn-green  { background:rgba(63,185,80,.15);  color:var(--green);  border-color:var(--green); }
        .content { padding:24px; max-width:1400px; margin:0 auto; }
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
        .stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px; }
        .stat-val { font-size:22px; font-weight:700; }
        .stat-sub { font-size:10px; color:var(--muted); margin-top:2px; }
        .section-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin:20px 0 10px; }
        table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:8px; overflow:hidden; border:1px solid var(--border); }
        th { background:#1c2128; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.6px; padding:8px 10px; text-align:left; border-bottom:1px solid var(--border); }
        td { padding:8px 10px; border-bottom:1px solid rgba(48,54,61,.5); font-size:12px; }
        tr:last-child td { border-bottom:none; }
        .win  { color:var(--green); font-weight:600; }
        .loss { color:var(--red); font-weight:600; }
        .open { color:var(--yellow); }
        .be   { color:var(--muted); }
        .badge { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; display:inline-block; }
        .badge-win  { background:rgba(63,185,80,.15); color:var(--green); }
        .badge-loss { background:rgba(248,81,73,.15);  color:var(--red); }
        .badge-open { background:rgba(210,153,34,.15); color:var(--yellow); }
        .badge-be   { background:rgba(139,148,158,.15);color:var(--muted); }
        .date-sep td { background:rgba(63,185,80,.06); font-weight:700; color:#58d68d; font-size:11px; letter-spacing:.4px; border-top:2px solid var(--border); }
        .resolve-form { display:flex; gap:8px; align-items:center; flex-wrap:wrap; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:20px; }
        .resolve-form input, .resolve-form select { background:#0d1117; border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:5px; font-size:12px; }
        .resolve-form label { font-size:11px; color:var(--muted); }
        .spinner { text-align:center; padding:40px; color:var(--muted); }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">
        <div class="logo-dot"></div>
        <div>
            <h1>SD SCANNER — LIVE TRADES</h1>
            <p>Recorded live alerts &amp; cumulative performance</p>
        </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a href="/" class="btn btn-blue">← Dashboard</a>
        <a href="/backtest" class="btn" style="background:rgba(240,136,62,.15);color:var(--orange);border-color:var(--orange)">📊 Backtest</a>
        <a href="/eod" class="btn btn-purple">📈 EOD Report</a>
        <button class="btn btn-green" onclick="loadData()">🔄 Refresh</button>
    </div>
</div>

<div class="content">

    <!-- Cumulative stats -->
    <div class="section-title">📊 Cumulative Performance (All Time)</div>
    <div class="stats-row" id="cum-stats">
        <div class="spinner">Loading...</div>
    </div>
    <div id="storage-status" style="font-size:11px;color:var(--muted);margin:-10px 0 18px 2px;"></div>

    <!-- Resolve open trade -->
    <div class="section-title">✏️ Resolve Open Trade</div>
    <div class="resolve-form">
        <div>
            <label>Ticker</label><br>
            <input id="resolve-ticker" placeholder="AAPL" style="width:90px"/>
        </div>
        <div>
            <label>Outcome</label><br>
            <select id="resolve-outcome">
                <option value="WIN">WIN</option>
                <option value="LOSS">LOSS</option>
                <option value="BE_STOP">BE_STOP</option>
                <option value="TIMEOUT">TIMEOUT</option>
            </select>
        </div>
        <div>
            <label>P&amp;L $ (e.g. 56.00 or -24.00)</label><br>
            <input id="resolve-pnl" type="number" step="0.01" placeholder="0.00" style="width:110px"/>
        </div>
        <button class="btn btn-green" onclick="resolveTrade()" style="align-self:flex-end">✅ Submit</button>
        <span id="resolve-msg" style="font-size:11px;color:var(--muted);align-self:flex-end"></span>
    </div>

    <!-- Today's trades -->
    <div class="section-title">📅 Today's Trades</div>
    <div id="today-section"><div class="spinner">Loading...</div></div>

    <!-- Full history -->
    <div class="section-title" style="margin-top:32px">🗂️ Full Trade History</div>
    <div id="history-section"><div class="spinner">Loading...</div></div>

</div>

<script>
function getDashboardToken() {
    return document.querySelector('meta[name="dashboard-token"]')?.content || '';
}
function postHeaders() {
    const t = getDashboardToken();
    return t ? { 'X-Dashboard-Token': t } : {};
}

async function loadData() {
    await Promise.all([loadCumulative(), loadToday(), loadHistory()]);
}

async function loadCumulative() {
    const d = await fetch('/api/trades/history').then(r=>r.json()).catch(()=>null);
    if (!d) return;
    const c = d.cumulative || {};
    const pnlAmount = c.totalPnlAmount || 0;
    const realizedDollarTrades = c.realizedDollarTrades || 0;
    document.getElementById('cum-stats').innerHTML = `
        <div class="stat-card"><div class="stat-label">Total Alerts</div><div class="stat-val">${c.totalAlerts||0}</div><div class="stat-sub">${c.tradingDays||0} trading days · ${c.avgTradesPerDay||0}/day avg</div></div>
        <div class="stat-card"><div class="stat-label">Resolved Trades</div><div class="stat-val">${(c.wins||0) + (c.losses||0) + (c.beStops||0)}</div><div class="stat-sub">${c.wins||0}W / ${c.losses||0}L / ${c.beStops||0}BE / ${c.notFilled||0}NF</div></div>
        <div class="stat-card"><div class="stat-label">Realized P&amp;L</div><div class="stat-val" style="color:${pnlAmount>=0?'var(--green)':'var(--red)'}">${pnlAmount>=0?'+':''}$${Math.abs(pnlAmount).toFixed(2)}</div><div class="stat-sub">${realizedDollarTrades} broker-matched closes</div></div>
        <div class="stat-card"><div class="stat-label">Open / Unresolved</div><div class="stat-val" style="color:var(--yellow)">${c.open||0}</div><div class="stat-sub">awaiting outcome</div></div>
    `;
    const storage = d.storage || {};
    const tracked = d.trackedStorage || {};
    document.getElementById('storage-status').textContent =
        `Trade log: ${storage.path || '—'} (${storage.exists ? 'exists' : 'missing'}, ${storage.records || 0} records) · ` +
        `Tracked positions: ${tracked.path || '—'} (${tracked.exists ? 'exists' : 'missing'}, ${tracked.trackedCount || 0} tracked)`;
}

async function loadToday() {
    const d = await fetch('/api/trades/today').then(r=>r.json()).catch(()=>null);
    if (!d || !d.trades || d.trades.length === 0) {
        document.getElementById('today-section').innerHTML = '<div style="color:var(--muted);padding:16px">No trades recorded today yet.</div>';
        return;
    }
    document.getElementById('today-section').innerHTML = buildTable(d.trades, d);
}

async function loadHistory() {
    const d = await fetch('/api/trades/history').then(r=>r.json()).catch(()=>null);
    if (!d || !d.trades || d.trades.length === 0) {
        document.getElementById('history-section').innerHTML = '<div style="color:var(--muted);padding:16px">No trade history recorded yet. Trades will appear here once the live scanner fires alerts.</div>';
        return;
    }
    // Sort newest first
    const sorted = [...d.trades].sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    document.getElementById('history-section').innerHTML = buildTable(sorted, null, true);
}

function formatEtFromTrade(t, kind) {
    let raw = null;
    if (kind === 'entry') {
        return `${t.date||''} ${t.time||''}`.trim() || '—';
    }
    raw = t.brokerExitAt || t.resolvedAt;
    if (!raw) return '—';
    let date;
    if (typeof raw === 'number') {
        date = new Date(raw);
    } else if (/^\d+$/.test(String(raw))) {
        date = new Date(parseInt(raw, 10));
    } else {
        date = new Date(raw);
    }
    if (Number.isNaN(date.getTime())) return '—';
    return date.toLocaleString('en-US', {
        timeZone: 'America/New_York',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
    }).replace(',', '');
}

function buildTable(trades, summary, groupByDate) {
    const badgeHtml = (outcome) => {
        const cls = outcome==='WIN'?'badge-win'
            : outcome==='LOSS'?'badge-loss'
            : outcome==='OPEN'?'badge-open'
            : outcome==='NOT_FILLED'?'badge-open'
            :'badge-be';
        return `<span class="badge ${cls}">${outcome}</span>`;
    };
    const pnlHtml = (t) => {
        if (t.outcome === 'OPEN') return `<span class="open">—</span>`;
        if (t.outcome === 'NOT_FILLED') return `<span class="be">— <span style="color:var(--muted);font-size:10px;">not filled</span></span>`;
        const amount = t.pnlAmount;
        const pct = t.pnlPct || 0;
        const cls = pct > 0 ? 'win' : pct < 0 ? 'loss' : 'be';
        if (amount !== null && amount !== undefined && amount !== '') {
            const num = parseFloat(amount || 0);
            return `<span class="${cls}">${num>=0?'+':''}$${Math.abs(num).toFixed(2)}</span>`;
        }
        return `<span class="be">— <span style="color:var(--muted);font-size:10px;">no broker fill</span></span>`;
    };

    let lastDate = '';
    let rows = '';
    let tradeNum = 0;

    for (const t of trades) {
        const date = t.date || '';
        if (groupByDate && date && date !== lastDate) {
            const dayTrades = trades.filter(x => x.date === date);
            const dayPnl = dayTrades.reduce((sum, x) => sum + parseFloat(x.pnlAmount || 0), 0);
            const pnlColor = dayPnl >= 0 ? 'var(--green)' : 'var(--red)';
            rows += `<tr class="date-sep"><td colspan="8">📅 ${date}
                <span style="font-weight:400;color:var(--muted);margin-left:10px">${dayTrades.length} alerts</span>
                <span style="margin-left:10px;color:${pnlColor};font-weight:600">${dayPnl>=0?'+':''}$${Math.abs(dayPnl).toFixed(2)}</span>
            </td></tr>`;
            lastDate = date;
        }
        tradeNum++;
        const dir = t.direction === 'long' ? '<span style="color:var(--green)">▲ LONG</span>' : '<span style="color:var(--red)">▼ SHORT</span>';
        rows += `<tr>
            <td style="color:var(--muted)">${tradeNum}</td>
            <td style="font-weight:600">${t.ticker||'—'}</td>
            <td>${dir}</td>
            <td style="font-family:monospace">${formatEtFromTrade(t, 'entry')}</td>
            <td style="font-family:monospace">${formatEtFromTrade(t, 'exit')}</td>
            <td style="font-family:monospace;font-size:11px;color:var(--muted)">${t.strategy||'smc'} · conf ${t.confidence||0}</td>
            <td>$${parseFloat(t.entry||0).toFixed(2)}</td>
            <td>${badgeHtml(t.outcome||'OPEN')}</td>
            <td>${pnlHtml(t)}</td>
        </tr>`;
    }

    return `<table>
        <thead><tr><th>#</th><th>TICKER</th><th>DIR</th><th>ENTRY TIME (ET)</th><th>EXIT TIME (ET)</th><th>STRATEGY</th><th>ENTRY</th><th>OUTCOME</th><th>P&amp;L</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

async function resolveTrade() {
    const ticker  = document.getElementById('resolve-ticker').value.trim().toUpperCase();
    const outcome = document.getElementById('resolve-outcome').value;
    const pnl     = document.getElementById('resolve-pnl').value || '0';
    const msg     = document.getElementById('resolve-msg');
    if (!ticker) { msg.textContent = 'Enter a ticker'; msg.style.color='var(--red)'; return; }
    try {
        const r = await fetch(`/api/trades/resolve?ticker=${ticker}&outcome=${outcome}&pnl=${pnl}`, { method:'POST', headers: postHeaders() });
        const d = await r.json();
        if (r.ok) {
            const amount = parseFloat(pnl || '0');
            msg.textContent = `✅ ${ticker} resolved as ${outcome} (${amount >= 0 ? '+' : ''}$${Math.abs(amount).toFixed(2)})`;
            msg.style.color = 'var(--green)';
            setTimeout(() => loadData(), 500);
        } else {
            msg.textContent = d.error || 'Error';
            msg.style.color = 'var(--red)';
        }
    } catch(e) {
        msg.textContent = 'Request failed';
        msg.style.color = 'var(--red)';
    }
}

loadData();
</script>
</body>
</html>
